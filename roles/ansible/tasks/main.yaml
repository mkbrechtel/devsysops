---

- name: debian packages
  apt:
    pkg:
      - ansible
      - ansible-core
      - ansible-lint
      - ansible-mitogen
      - python3-jmespath
      - python3-pymysql
      - python3-dnspython
      - python3-libcloud
      - python3-netaddr

- name: ansible etc directory
  file:
    path: /etc/ansible
    state: directory

- name: ansible config
  template:
    src: ansible.cfg.j2
    dest: /etc/ansible/ansible.cfg
