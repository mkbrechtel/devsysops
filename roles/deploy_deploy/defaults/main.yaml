---

deploy_systemd_units_scope: system
deploy_user_install_mode: global  # global or home

# Notification settings
notify_email_to: ""
notify_email_from: "deploy@{{ ansible_hostname }}"
notify_email_on_success: false
notify_email_on_failure: true
notify_email_max_output_lines: 100
notify_email_rate_limit: 10
