---

- name: root user password
  user:
    name: root
    password: "{{ root_user_password }}"
  when: root_user_password is defined

- name: root user ssh key
  user:
    name: root
    generate_ssh_key: yes
    ssh_key_type: ed25519
  when: root_user_with_ssh_key

- name: root user ssh directory
  file:
    path: /root/.ssh
    state: directory
    mode: 0700
  when: root_user_ssh_authorized_keys is defined

- name: root user ssh authorized keys
  copy:
    content: "{{ root_user_ssh_authorized_keys | join('\n') }}"
    dest: /root/.ssh/authorized_keys
  when: root_user_ssh_authorized_keys is defined

- name: shell for root user
  user:
    name: root
    shell: "{{root_user_shell}}"
  tags:
    - shells
