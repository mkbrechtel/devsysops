---
- name: Create Incus VMs for testing sysops collection
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    incus_image: images:debian/13/cloud
    vm_memory: 2GiB
    vm_disk: 20GiB

  tasks:
    - name: Create VM
      community.general.lxd_container:
        url: unix:/var/lib/incus/unix.socket
        name: "{{ item }}"
        state: started
        source:
          type: image
          mode: pull
          server: https://images.linuxcontainers.org
          alias: debian/13/cloud
        type: virtual-machine
        config:
          limits.memory: "{{ vm_memory }}"
        devices:
          root:
            path: /
            pool: default
            type: disk
            size: "{{ vm_disk }}"
        wait_for_container: true
        wait_for_ipv4_addresses: true
        timeout: 300
      register: vm_results
      loop: "{{ groups['vms'] }}"

- name: Test sysops collection roles
  hosts: vms
  become: true
